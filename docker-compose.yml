services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-combar}
      POSTGRES_USER: ${DB_USER:-combar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-combar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-combar} -d ${DB_NAME:-combar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: "3001"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-combar}
      DB_USER: ${DB_USER:-combar}
      DB_PASSWORD: ${DB_PASSWORD:-combar}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
