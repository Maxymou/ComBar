services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_DB: ${DB_NAME:-combar}
      POSTGRES_USER: ${DB_USER:-combar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-combar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-combar} -d ${DB_NAME:-combar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3001"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-combar}
      DB_USER: ${DB_USER:-combar}
      DB_PASSWORD: ${DB_PASSWORD:-combar}
      DEBUG_ADMIN_TOKEN: ${DEBUG_ADMIN_TOKEN:-}
      DEBUG_HOST_API_URL: ${DEBUG_HOST_API_URL:-http://host.docker.internal:4878}
      DEBUG_WORKDIR: ${DEBUG_WORKDIR:-/opt/ComBar}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      no_cache: true
      args:
        VITE_API_URL: ""
        VITE_ENABLE_PWA: "true"
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
        VITE_DEBUG_ADMIN_TOKEN: ${VITE_DEBUG_ADMIN_TOKEN:-}
        CACHE_BUST: ${CACHE_BUST:-1}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
